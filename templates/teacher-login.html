<!DOCTYPE html>
<html lang="en">
<head>
    <title>Teacher Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            /* Premium dark theme */
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%) !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            padding: 3rem 2.5rem;
        }

        /* 🎨 TEACHER THEME: Indigo/Purple instead of Green */
        .icon-circle {
            width: 70px;
            height: 70px;
            background: rgba(99, 102, 241, 0.1);
            color: #6366f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
        }

        .nav-pills {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 0.3rem;
            margin-bottom: 2rem;
        }

        .nav-pills .nav-link {
            color: #64748b;
            font-weight: 600;
            border-radius: 10px;
            padding: 0.6rem;
            transition: all 0.3s ease;
        }

        .nav-pills .nav-link.active {
            background: #ffffff;
            color: #6366f1; /* Indigo active text */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .input-group-text {
            background: transparent;
            border-right: none;
            color: #94a3b8;
            padding-left: 1.2rem;
        }

        .form-control {
            border-left: none;
            padding: 0.8rem 1rem;
            color: #1e293b;
            font-weight: 500;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }

        .input-group {
            border-radius: 10px;
            overflow: hidden;
        }

        /* 🎨 TEACHER THEME: Indigo focus glow */
        .input-group:focus-within {
            box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.25);
        }
        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control {
            border-color: #6366f1;
        }

        /* 🎨 TEACHER THEME: Indigo/Purple Gradient Button */
        .btn-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.8rem;
            border-radius: 10px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            color: white;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body>

    <div class="auth-card text-center position-relative">
        
        <a href="/" class="text-muted text-decoration-none position-absolute top-0 start-0 mt-4 ms-4" style="font-size: 0.9rem;">
            <i class="bi bi-arrow-left me-1"></i> Back
        </a>

        <div class="icon-circle">
            <i class="bi bi-briefcase-fill"></i>
        </div>
        <h3 class="fw-bold text-dark mb-4">Teacher Portal</h3>

        {% if error %}
            <div class="alert alert-danger py-2 border-0 fw-medium shadow-sm"><i class="bi bi-exclamation-circle-fill me-2"></i>{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="alert alert-success py-2 border-0 fw-medium shadow-sm"><i class="bi bi-check-circle-fill me-2"></i>{{ success }}</div>
        {% endif %}

        <ul class="nav nav-pills nav-fill" id="authTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#login" type="button" role="tab">Log In</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="register-tab" data-bs-toggle="pill" data-bs-target="#register" type="button" role="tab">Sign Up</button>
            </li>
        </ul>

        <div class="tab-content" id="authTabsContent">
            
            <div class="tab-pane fade show active" id="login" role="tabpanel">
                <form action="/login" method="POST" class="text-start">
                    <input type="hidden" name="role" value="teacher">
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold small mb-1">Email or Username</label>
                        <div class="input-group border">
                            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                            <input type="text" name="identifier" class="form-control" placeholder="Enter your ID" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted fw-semibold small mb-1">Password</label>
                        <div class="input-group border">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-gradient w-100 fs-5">Login to Dashboard</button>
                </form>
            </div>

            <div class="tab-pane fade" id="register" role="tabpanel">
                <form action="/register" method="POST" class="text-start">
                    <input type="hidden" name="role" value="teacher">
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold small mb-1">Username</label>
                        <div class="input-group border">
                            <span class="input-group-text"><i class="bi bi-person-badge-fill"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold small mb-1">Email Address</label>
                        <div class="input-group border">
                            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                            <input type="email" name="email" class="form-control" placeholder="teacher@school.edu" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted fw-semibold small mb-1">Password</label>
                        <div class="input-group border">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-gradient w-100 fs-5">Create Account</button>
                </form>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
